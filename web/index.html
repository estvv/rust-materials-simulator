<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Materials</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            display: block;
            background: #000;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
    <body>
        <div id="game-container">
            <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        </div>
        <div id="loading">
            <div>Loading Dynamic Materials...</div>
        </div>

        <script>
            var Module = {
                canvas: document.getElementById('canvas'),

                onRuntimeInitialized: function() {
                    document.getElementById('loading').style.display = 'none';
                    console.log('Dynamic Materials loaded successfully');
                },

                print: function(text) {
                    console.log(text);
                },

                printErr: function(text) {
                    console.error(text);
                }
            };
        </script>
        <script async src="dynamic_materials.js"></script>
    </body>
</html>
