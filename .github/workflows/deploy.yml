name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Emscripten SDK
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: latest
        actions-cache-folder: 'emsdk-cache'

    - name: Verify Emscripten
      run: emcc --version

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-emscripten

    - name: Cache Cargo builds
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-emscripten-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-emscripten-

    - name: Build WASM
      env:
        EMCC_CFLAGS: "-O3 -sUSE_GLFW=3 -sASSERTIONS=0 -sWASM=1 -sGL_ENABLE_GET_PROC_ADDRESS=1 -sFORCE_FILESYSTEM=1 -sALLOW_MEMORY_GROWTH=1 --preload-file ./config@config"
      run: cargo build --target wasm32-unknown-emscripten --release

    - name: Prepare deployment package
      run: |
        mkdir -p deploy
        cp web/index.html deploy/

        OUT=target/wasm32-unknown-emscripten/release
        cp "$OUT"/*.js deploy/ 2>/dev/null || true
        cp "$OUT"/*.wasm deploy/ 2>/dev/null || true
        cp "$OUT"/*.data deploy/ 2>/dev/null || true

        cd deploy
        [ -f foo.js ] && mv foo.js dynamic_materials.js
        [ -f foo.wasm ] && mv foo.wasm dynamic_materials.wasm

        ls -la

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: deploy
